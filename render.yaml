services:
  - type: web
    name: discord-clone
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build && cd ../server && npx prisma generate
    startCommand: cd server && npx prisma db push && npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discord-clone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 22

databases:
  - name: discord-clone-db
    region: frankfurt
    plan: free
    databaseName: discord_clone
